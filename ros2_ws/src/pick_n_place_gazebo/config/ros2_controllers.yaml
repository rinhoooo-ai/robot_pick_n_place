# ros2_controllers.yaml
# Controller configuration for Franka FR3 in Gazebo Harmonic
# Loaded by controller_manager at simulation start

controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    # Joint state broadcaster — publishes /joint_states
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Arm trajectory controller
    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # Gripper action controller
    gripper_controller:
      type: franka_gripper/GripperActionController

# ─── Arm Controller ───────────────────────────────────────────
arm_controller:
  ros__parameters:
    joints:
      - fr3_joint1
      - fr3_joint2
      - fr3_joint3
      - fr3_joint4
      - fr3_joint5
      - fr3_joint6
      - fr3_joint7

    command_interfaces: [position]
    state_interfaces:   [position, velocity]

    # Accept goals from /fr3/arm_controller/follow_joint_trajectory
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false

    # Tolerances
    goal_time: 0.5
    stopped_velocity_tolerance: 0.01
    constraints:
      fr3_joint1: { goal: 0.05 }
      fr3_joint2: { goal: 0.05 }
      fr3_joint3: { goal: 0.05 }
      fr3_joint4: { goal: 0.05 }
      fr3_joint5: { goal: 0.05 }
      fr3_joint6: { goal: 0.05 }
      fr3_joint7: { goal: 0.05 }

# ─── Gripper Controller ───────────────────────────────────────
gripper_controller:
  ros__parameters:
    joint: fr3_finger_joint1
    use_action: true
    max_effort: 50.0
    speed: 0.1
    grasp_epsilon:
      inner: 0.005
      outer: 0.005
